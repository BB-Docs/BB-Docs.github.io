---
layout: default
---
<article class="lesson">
  <p class="lesson-date">
    <a href="{{ '/' | relative_url }}" class="back">← All lessons</a>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%A, %-d %B %Y" }}</time>
  </p>
  <h1 class="lesson-title">{{ page.title }}</h1>
  {% if page.subtitle %}<p class="lesson-subtitle">{{ page.subtitle }}</p>{% endif %}

  <div class="lesson-body">
    {{ content }}
  </div>

  <nav class="lesson-pager">
    {% if page.previous %}<a class="prev" href="{{ page.previous.url | relative_url }}">← {{ page.previous.title }}</a>{% endif %}
    {% if page.next %}<a class="next" href="{{ page.next.url | relative_url }}">{{ page.next.title }} →</a>{% endif %}
  </nav>
</article>
