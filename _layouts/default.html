<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/logo.svg' | relative_url }}">
  {%- feed_meta -%}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-lockup" src="{{ '/assets/img/logo-lockup.svg' | relative_url }}"
           alt="Daily Lesson Notes" width="196" height="40">
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">All lessons</a>
      <a href="{{ '/subscribe/' | relative_url }}">Subscribe</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>{{ site.title }} · {{ site.tagline }}</p>
    <p class="site-footer-credit">
      Lessons from <a href="https://kabbalahmedia.info/" target="_blank" rel="noopener">kabbalahmedia.info</a>
      · <a href="{{ '/subscribe/' | relative_url }}">Subscribe</a>
      · <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </p>
  </footer>
</body>
</html>
